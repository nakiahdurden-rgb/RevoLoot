<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule</title>

    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --deep-red: #8b0000;
            --gold: #c5a059;
            --dark-green: #0f3210;
            --beige: #cbbda1;
            --dark-bg: #1c1c1c;
            --card-dark: #1f1f1f;
            --text-dark: #222;
            --text-light: #fff;
        }

        body {
            margin: 0;
            font-family: "Montserrat", sans-serif;
            background: var(--beige);
            color: var(--text-dark);
            display: flex;
            height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        body.dark {
            background: var(--dark-bg);
            color: var(--text-light);
        }

        body.dark .sidebar {
            background: var(--dark-bg);
            border-right-color: var(--gold);
        }

        body.dark .main {
            background: var(--dark-bg);
        }

        body.dark .calendar {
            background: var(--card-dark);
            color: var(--text-light);
        }

        body.dark .day {
            background: rgba(255,255,255,0.05);
            border-color: var(--gold);
        }

        body.dark .day .date {
            color: var(--text-light);
        }

        body.dark .modal-panel {
            background: var(--card-dark);
            color: var(--text-light);
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--beige);
            padding: 20px;
            border-right: 2px solid var(--dark-green);
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 70px;
            overflow-y: auto;
        }

        .sidebar input {
            padding: 10px;
            border: 2px solid var(--dark-green);
            background: #fff;
            font-family: "Almendra", serif;
            font-size: 16px;
        }

        body.dark .sidebar input {
            background: var(--card-dark);
            color: var(--text-light);
            border-color: var(--gold);
        }

        .filter-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
            font-family: "Almendra", serif;
            color: var(--dark-green);
        }

        body.dark .filter-title {
            color: var(--gold);
        }

        .filter-group {
            margin-bottom: 8px;
        }

        .filter-label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        body.dark .filter-label {
            color: var(--text-light);
        }

        .filters label {
            display: block;
            margin: 6px 0;
            cursor: pointer;
        }

        /* Main content */
        .main {
            flex: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            margin-top: 70px;
            overflow-y: auto;
        }

        /* Calendar specific styles */
        .calendar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            background: transparent;
            padding: 6px 10px;
        }

        .calendar {
            background: #fff;
            border-radius: 10px;
            padding: 16px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-bottom: 8px;
        }

        .weekday {
            font-weight: 700;
            color: var(--text-dark);
            text-align: center;
            padding: 8px 0;
        }

        body.dark .weekday {
            color: var(--text-light);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .day {
            min-height: 120px;
            padding: 8px;
            border-radius: 8px;
            background: linear-gradient(180deg, #fff, #fbf8f3);
            border: 1px solid rgba(0,0,0,0.04);
            position: relative;
            overflow: hidden;
        }

        .day.other {
            opacity: 0.45;
        }

        .day .date {
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 6px;
        }

        .events {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 84px;
            overflow: auto;
            padding-right: 4px;
        }

        .event {
            background: linear-gradient(90deg, var(--deep-red), var(--gold));
            color: #fff;
            padding: 6px;
            border-radius: 6px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .event .event-meta {
            font-size: 11px;
            opacity: 0.95;
        }

        .event .event-actions {
            margin-left: 8px;
        }

        .event.registered {
            outline: 3px solid rgba(43, 120, 43, 0.12);
        }

        /* Topic-based event colors */
        .event.civil-war {
            background: linear-gradient(90deg, var(--deep-red), #8b0000);
        }

        .event.ancient-study {
            background: linear-gradient(90deg, var(--gold), #c5a059);
        }

        .event.us-history {
            background: linear-gradient(90deg, var(--dark-green), #0f3210);
        }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.35);
            z-index: 40;
        }

        .modal[aria-hidden="false"] {
            display: flex;
        }

        .modal-panel {
            background: #fff;
            padding: 18px;
            border-radius: 12px;
            width: 420px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
        }

        .modal-panel form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .modal-panel label {
            display: flex;
            flex-direction: column;
            font-weight: 600;
            color: var(--text-dark);
        }

        body.dark .modal-panel label {
            color: var(--text-light);
        }

        .modal-panel input, .modal-panel select {
            padding: 8px;
            border-radius: 8px;
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

        body.dark .modal-panel input, body.dark .modal-panel select {
            background: var(--card-dark);
            color: var(--text-light);
            border-color: var(--gold);
        }

        .friends-fieldset {
            border: 1px dashed rgba(0, 0, 0, 0.06);
            padding: 8px;
            border-radius: 8px;
        }

        #friendsList {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .friend-checkbox {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f7f3ee;
            padding: 6px 8px;
            border-radius: 8px;
        }

        body.dark .friend-checkbox {
            background: var(--card-dark);
            border: 1px solid var(--gold);
        }

        /* Buttons */
        .btn {
            padding: 10px 14px;
            border-radius: 8px;
            border: 0;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--deep-red);
            color: #fff;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--deep-red);
            color: var(--deep-red);
        }

        body.dark .btn-outline {
            border-color: var(--gold);
            color: var(--gold);
        }

        .btn-sm {
            padding: 6px 8px;
            font-size: 13px;
        }

        .icon-btn {
            background: transparent;
            border: 0;
            font-size: 18px;
            padding: 6px 10px;
            cursor: pointer;
            color: var(--deep-red);
        }

        body.dark .icon-btn {
            color: var(--gold);
        }

        .spacer {
            flex: 1;
        }

        .h3 {
            font-size: 18px;
            margin: 0 0 8px 0;
            color: var(--deep-red);
        }

        body.dark .h3 {
            color: var(--gold);
        }

        .h2 {
            font-size: 20px;
            margin: 0;
            color: var(--dark-green);
            font-family: "Almendra", serif;
        }

        body.dark .h2 {
            color: var(--gold);
        }

        .chips {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chip {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f5efe6;
            border-radius: 8px;
            padding: 8px 10px;
            border: 1px solid rgba(0, 0, 0, 0.06);
            cursor: pointer;
            color: #222;
            font-weight: 600;
        }

        .chip input {
            margin-right: 8px;
        }

        body.dark .chip {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--gold);
            color: var(--text-light);
        }

        /* Navigation Bar */
        .navbar {
            width: 100%;
            background: var(--beige);
            border-bottom: 2px solid var(--dark-green);
            padding: 5px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: "Almendra", serif;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        body.dark .navbar {
            background: var(--dark-bg);
            border-bottom-color: var(--gold);
        }

        .nav-logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--dark-green);
            flex: 1;
        }

        body.dark .nav-logo {
            color: var(--gold);
        }

        .nav-links {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 20px;
            flex: 2;
            margin: 0px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--dark-green);
            font-size: 16px;
            transition: color 0.3s;
        }

        .nav-right {
            display: flex;
            justify-content: flex-end;
            margin-right: 100px;
        }

        body.dark .nav-links a {
            color: var(--text-light);
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--deep-red);
        }

        .dark-toggle {
            padding: 6px 10px;
            border: 2px solid var(--dark-green);
            background: var(--beige);
            cursor: pointer;
            font-family: "Almendra", serif;
            color: var(--dark-green);
            font-weight: bold;
            transition: 0.3s;
            pointer-events: auto;
            z-index: 1001;
            position: relative;
        }

        body.dark .dark-toggle {
            background: var(--card-dark);
            color: var(--text-light);
            border-color: var(--gold);
        }

        .dark-toggle:hover {
            background-color: var(--gold);
            color: var(--text-dark);
        }

        body.dark .dark-toggle:hover {
            background-color: var(--deep-red);
        }

        /* small screens */
        @media (max-width: 900px) {
            .sidebar {
                width: 100%;
            }

            .main {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-logo"><a href="index.html"><img src="logo-2.png" alt="RevoLoot" width="100px"></a></div>
    
    <div class="nav-links">
        <a href="about.html">About</a>
        <a href="Resources Page.html">Resources</a>
        <a href="Schedule Page.html" class="active">Schedule</a>
        <button class="dark-toggle" id="darkToggle">Dark Mode</button>
    </div>
   
    <div class="nav-right"></div>
</nav>

<aside class="sidebar">
  <h2 class="filter-title">Filter</h2>

  <div class="filter-group">
    <label class="filter-label">Topic</label>
    <div id="topicFilters" class="chips"></div>
  </div>

  <div class="filter-group">
    <label class="filter-label">Length</label>
    <div id="lengthFilters" class="chips"></div>
  </div>

  <div class="filter-group">
    <label class="filter-label">Shipmates Attending</label>
    <div id="friendFilters" class="chips"></div>
  </div>

  <button id="connectCalendar" class="btn btn-outline">Connect your calendar</button>
  <div class="spacer"></div>
  <button id="createSessionBtn" class="btn btn-primary">Create Session</button>
</aside>

<main class="main">
  <header class="calendar-header">
    <div class="nav">
      <button id="prevYear" class="icon-btn">«</button>
      <button id="prevMonth" class="icon-btn">‹</button>
    </div>

    <div class="title">
      <h1 id="monthYear" class="h2"></h1>
      <div class="controls">
        <select id="monthSelect" aria-label="Select Month">
          <option value="0">January</option>
          <option value="1">February</option>
          <option value="2">March</option>
          <option value="3">April</option>
          <option value="4">May</option>
          <option value="5">June</option>
          <option value="6">July</option>
          <option value="7">August</option>
          <option value="8">September</option>
          <option value="9">October</option>
          <option value="10">November</option>
          <option value="11">December</option>
        </select>
      </div>
    </div>

    <div class="nav">
      <button id="nextMonth" class="icon-btn">›</button>
      <button id="nextYear" class="icon-btn">»</button>
    </div>
  </header>

  <div id="calendar" class="calendar" aria-live="polite"></div>
</main>

<!-- Create / Edit Modal -->
<div id="modal" class="modal" aria-hidden="true">
  <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <h3 id="modalTitle" class="h3">Create Study Session</h3>
    <form id="eventForm">
      <label>Title
        <input name="title" required />
      </label>

      <label>Date
        <input type="date" name="date" required />
      </label>

      <label>Start time
        <input type="time" name="start" required />
      </label>

      <label>Length (minutes)
        <input type="number" name="length" min="15" step="15" value="60" required />
      </label>

      <label>Topic
        <select name="topic" id="topicSelect" required></select>
      </label>

      <fieldset class="friends-fieldset">
        <legend>Invite Friends</legend>
        <div id="friendsList"></div>
      </fieldset>

      <div class="modal-actions">
        <button type="submit" class="btn btn-primary">Save</button>
        <button type="button" id="cancelBtn" class="btn btn-outline">Cancel</button>
      </div>
    </form>
  </div>
</div>

<template id="eventTemplate">
  <div class="event">
    <div class="event-title"></div>
    <div class="event-meta"></div>
    <div class="event-actions">
      <button class="btn btn-sm btn-register">Register</button>
    </div>
  </div>
</template>

<script src="app.js"></script>
<script>
  // Dark mode toggle
  document.addEventListener('DOMContentLoaded', () => {
    const darkToggle = document.getElementById('darkToggle');
    if (darkToggle) {
      darkToggle.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        document.body.classList.toggle('dark');
        localStorage.setItem('darkMode', document.body.classList.contains('dark'));
      });
      
      // Restore dark mode preference
      if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark');
      }
    }
  });
</script>
</body>
</html>
